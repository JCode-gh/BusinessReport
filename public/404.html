<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Pagina niet gevonden — GrowthKit</title>
    <meta name="theme-color" content="#100d28" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Montserrat, system-ui, sans-serif;
        background: linear-gradient(180deg, #161033 0%, #0d0b22 100%);
        color: #fff;
      }
      main {
        max-width: 480px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
        font-weight: 800;
      }
      p {
        margin: 0 0 24px;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.6;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        display: inline-flex;
        align-items: center;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 700;
        text-decoration: none;
        font-size: 0.92rem;
      }
      .primary {
        background: linear-gradient(135deg, #d6a4e3, #6f6acf);
        color: #fff;
      }
      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.9);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>Deze pagina bestaat niet. Ga terug naar GrowthKit of bekijk het voorbeeldrapport.</p>
      <div class="actions">
        <a class="primary" href="/">Naar home</a>
        <a class="secondary" href="/example/">Voorbeeldrapport</a>
      </div>
    </main>
  </body>
</html>
