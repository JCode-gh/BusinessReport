[build]
command = "npm run build"
publish = "dist"

# Firebase client config is intentionally embedded in the Vite bundle (public by design).
# Do not mark these as "Contains secret values" in Netlify — security is enforced via Firebase rules.
[build.environment]
SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
